name: Build Native Binaries

on:
  push:
    branches: [ master ]
    paths:
      - 'split-tests/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'split-tests/**'
  workflow_dispatch:

jobs:
  build-unix:
    name: Build Unix Binary (Linux/macOS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Verify GraalVM installation
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          java --version
          native-image --version

      - name: Make build script executable
        run: chmod +x split-tests/build-native-unix.sh

      - name: Build native binary
        run: |
          cd split-tests
          ./build-native-unix.sh

      - name: Verify binary
        run: |
          ls -lh split-tests/binary/
          file split-tests/binary/SplitTestCase
          split-tests/binary/SplitTestCase --help || true

      - name: Upload Unix binary
        uses: actions/upload-artifact@v4
        with:
          name: SplitTestCase
          path: split-tests/binary/SplitTestCase
          retention-days: 30

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Verify GraalVM installation
        run: |
          echo "GRAALVM_HOME: $env:GRAALVM_HOME"
          echo "JAVA_HOME: $env:JAVA_HOME"
          java --version
          native-image --version

      - name: Build native binary
        run: |
          cd split-tests
          .\build-native-windows.bat
        shell: cmd

      - name: Verify binary
        run: |
          dir split-tests\binary\
          split-tests\binary\SplitTestCase.exe --help
        shell: cmd
        continue-on-error: true

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: SplitTestCase.exe
          path: split-tests/binary/SplitTestCase.exe
          retention-days: 30
