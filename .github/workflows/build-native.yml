name: Build Native Binaries

on:
  push:
    branches: [ master ]
    paths:
      - 'split-tests/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'split-tests/**'
  workflow_dispatch:
  workflow_call:
    inputs:
      retention-days:
        description: 'Artifact retention days'
        required: false
        type: number
        default: 30

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Verify GraalVM installation
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          java --version
          native-image --version

      - name: Make build script executable
        run: chmod +x split-tests/build-native-unix.sh

      - name: Build native binary
        run: |
          cd split-tests
          ./build-native-unix.sh

      - name: Verify binary
        run: |
          ls -lh split-tests/binary/
          file split-tests/binary/SplitTestCase
          split-tests/binary/SplitTestCase

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: SplitTestCase-linux
          path: split-tests/binary/SplitTestCase
          retention-days: ${{ inputs.retention-days || 30 }}

  build-macos:
    name: Build macOS Binary
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Verify GraalVM installation
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          java --version
          native-image --version

      - name: Make build script executable
        run: chmod +x split-tests/build-native-unix.sh

      - name: Build native binary
        run: |
          cd split-tests
          ./build-native-unix.sh

      - name: Verify binary
        run: |
          ls -lh split-tests/binary/
          file split-tests/binary/SplitTestCase
          split-tests/binary/SplitTestCase

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: SplitTestCase-macos
          path: split-tests/binary/SplitTestCase
          retention-days: ${{ inputs.retention-days || 30 }}

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Verify GraalVM installation
        run: |
          echo "GRAALVM_HOME: $env:GRAALVM_HOME"
          echo "JAVA_HOME: $env:JAVA_HOME"
          java --version
          native-image --version

      - name: Build native binary
        run: |
          cd split-tests
          .\build-native-windows.bat
        shell: cmd

      - name: Verify binary
        run: |
          dir split-tests\binary\
          split-tests\binary\SplitTestCase.exe
        shell: cmd
        continue-on-error: true

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: SplitTestCase.exe
          path: split-tests/binary/SplitTestCase.exe
          retention-days: ${{ inputs.retention-days || 30 }}

  package:
    name: Package Combined Archive
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: SplitTestCase-linux
          path: ./package/linux

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: SplitTestCase-macos
          path: ./package/macos

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: SplitTestCase.exe
          path: ./package/windows

      - name: Organize binaries
        run: |
          mkdir -p package/SplitTestCase
          mv package/linux/SplitTestCase package/SplitTestCase/SplitTestCase-linux
          mv package/macos/SplitTestCase package/SplitTestCase/SplitTestCase-macos
          mv package/windows/SplitTestCase.exe package/SplitTestCase/SplitTestCase.exe
          chmod +x package/SplitTestCase/SplitTestCase-linux
          chmod +x package/SplitTestCase/SplitTestCase-macos

      - name: Create zip archive
        run: |
          cd package
          zip -r ../SplitTestCase-all-platforms.zip SplitTestCase/
          cd ..
          ls -lh SplitTestCase-all-platforms.zip
          unzip -l SplitTestCase-all-platforms.zip

      - name: Upload combined archive
        uses: actions/upload-artifact@v4
        with:
          name: SplitTestCase-all-platforms.zip
          path: SplitTestCase-all-platforms.zip
          retention-days: ${{ inputs.retention-days || 30 }}
