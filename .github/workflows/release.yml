name: Release Native Binaries

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  build:
    name: Build Binaries
    uses: ./.github/workflows/build-native.yml
    with:
      retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: SplitTestCase-linux
          path: ./artifacts/linux

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: SplitTestCase-macos
          path: ./artifacts/macos

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: SplitTestCase.exe
          path: ./artifacts/windows

      - name: Download combined archive
        uses: actions/download-artifact@v4
        with:
          name: SplitTestCase-all-platforms.zip
          path: ./artifacts/zip

      - name: Prepare binaries for release
        run: |
          mv ./artifacts/linux/SplitTestCase-linux ./artifacts/
          mv ./artifacts/macos/SplitTestCase-macos ./artifacts/
          mv ./artifacts/windows/SplitTestCase.exe ./artifacts/
          chmod +x ./artifacts/SplitTestCase-linux
          chmod +x ./artifacts/SplitTestCase-macos
          ls -lh ./artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            ./artifacts/SplitTestCase-linux
            ./artifacts/SplitTestCase-macos
            ./artifacts/SplitTestCase.exe
            ./artifacts/zip/SplitTestCase-all-platforms.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
